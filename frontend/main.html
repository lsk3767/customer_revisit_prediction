<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>환자 분석 시스템</title>
</head>

<body style="
  font-family: Arial;
  background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
  margin: 0;
  padding: 40px;
">

<div style="
  max-width: 800px;
  margin: auto;
  text-align: center;
">

<h1 style="margin-bottom: 40px;">🏥 환자 분석 시스템</h1>

<div style="
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
">

<!-- 이탈 예측 -->

<div onclick="go('index.html')" style="
  background: white;
  padding: 30px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.2s;
">
  <h2>📉 환자 이탈 예측</h2>
  <p>AI 기반 재방문 확률 분석</p>
</div>

<!-- 고액 환자 -->

<div onclick="go('highvalue.html')" style="
  background: white;
  padding: 30px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
">
  <h2>💰 고액 환자 분석</h2>
  <p>환자 방문 시각화</p>
</div>

</div>

</div>

<script>
function go(page){
  location.href = page
}
</script>

</body>
</html>
